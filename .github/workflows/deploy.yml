name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            REPO_DIR=/opt/vibeproto/repo

            # 首次部署：克隆仓库
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/lucienlichen/vibeproto.git $REPO_DIR
            fi

            # 拉取最新代码
            cd $REPO_DIR
            git fetch origin main
            git reset --hard origin/main

            # 复制部署配置（保留服务器上的 .env）
            cd $REPO_DIR/deploy
            cp -n /opt/vibeproto/deploy/.env .env 2>/dev/null || true

            # 构建镜像（使用腾讯云 Docker Hub 镜像加速）
            docker compose build --no-cache backend frontend

            # 启动所有服务
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            echo "=== 部署完成 ==="
            docker compose ps
