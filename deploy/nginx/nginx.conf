worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  server {
    listen 80;
    server_name _;

    # Release version pages: SPA fallback to index.html for client-side routing
    location ~ ^(/projects/[^/]+/releases/[^/]+)(/.*)? {
      root /opt/vibeproto;
      disable_symlinks off;
      try_files $uri $1/index.html;
    }

    # Project/release directory listing
    location /projects/ {
      root /opt/vibeproto;
      autoindex on;
      disable_symlinks off;
      try_files $uri $uri/ =404;
    }

    location / {
      return 200 'vibeproto nginx is running';
      add_header Content-Type text/plain;
    }
  }
}
